<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>女性身材穿搭推荐助手</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7fb;
        --card: #ffffff;
        --accent: #6a5acd;
        --text: #1f2330;
        --subtext: #636a7a;
        --border: #e5e7ef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans CJK SC", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 960px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.2rem;
        box-shadow: 0 8px 20px rgba(16, 24, 40, 0.04);
      }

      h1 {
        margin: 0 0 0.4rem;
      }

      .subtitle {
        margin-top: 0;
        color: var(--subtext);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.35rem;
      }

      input,
      select,
      button {
        width: 100%;
        padding: 0.7rem 0.8rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 0.95rem;
      }

      button {
        background: var(--accent);
        border: none;
        color: white;
        margin-top: 1rem;
        font-weight: 700;
        cursor: pointer;
      }

      .result {
        margin-top: 1rem;
        display: none;
      }

      .pill {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        background: #ecebff;
        color: #3a2ec9;
        margin-right: 0.5rem;
        font-weight: 600;
      }

      ul {
        margin: 0.4rem 0 0;
      }

      .footnote {
        margin-top: 0.8rem;
        color: var(--subtext);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>女性身材穿搭推荐助手</h1>
        <p class="subtitle">输入尺码、身高和体重，自动给出推荐尺码 + 穿搭建议（MVP版）。</p>

        <form id="fit-form" class="grid">
          <div>
            <label for="knownSize">你平时常穿尺码（可选）</label>
            <select id="knownSize">
              <option value="">未填写</option>
              <option>XS</option>
              <option>S</option>
              <option>M</option>
              <option>L</option>
              <option>XL</option>
              <option>XXL</option>
            </select>
          </div>

          <div>
            <label for="height">身高（cm）</label>
            <input id="height" type="number" min="130" max="200" required />
          </div>

          <div>
            <label for="weight">体重（kg）</label>
            <input id="weight" type="number" min="30" max="150" required />
          </div>

          <div>
            <label for="occasion">使用场景</label>
            <select id="occasion">
              <option value="daily">通勤日常</option>
              <option value="date">约会温柔</option>
              <option value="sport">休闲运动</option>
            </select>
          </div>
        </form>

        <button id="recommend-btn" type="button">生成推荐</button>

        <article id="result" class="result card">
          <p><span class="pill" id="size-pill"></span><span class="pill" id="shape-pill"></span></p>
          <h3>尺码建议</h3>
          <p id="size-detail"></p>
          <h3>穿搭建议</h3>
          <ul id="outfit-list"></ul>
          <p class="footnote">提示：不同品牌版型偏差较大，建议最终结合胸围/腰围/臀围和商品尺码表二次确认。</p>
        </article>
      </section>
    </main>

    <script>
      const sizeOrder = ["XS", "S", "M", "L", "XL", "XXL"];

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function recommendSize(height, weight, knownSize) {
        const bmi = weight / ((height / 100) ** 2);
        let score = 0;

        if (height < 155) score -= 1;
        else if (height > 170) score += 1;

        if (weight < 47) score -= 1;
        else if (weight > 62) score += 1;
        else if (weight > 72) score += 2;

        if (bmi >= 24) score += 1;
        if (bmi >= 28) score += 1;

        let baseIndex = 2 + score;

        if (knownSize) {
          const knownIndex = sizeOrder.indexOf(knownSize);
          if (knownIndex >= 0) {
            baseIndex = Math.round((baseIndex + knownIndex) / 2);
          }
        }

        const idx = clamp(baseIndex, 0, sizeOrder.length - 1);
        return { size: sizeOrder[idx], bmi: Number(bmi.toFixed(1)) };
      }

      function detectBodyShape(height, weight) {
        const bmi = weight / ((height / 100) ** 2);
        if (bmi < 18.5) return "纤细型";
        if (bmi < 23.9) return "匀称型";
        if (bmi < 27.9) return "微曲线型";
        return "丰满型";
      }

      function outfitBy(occasion, bodyShape) {
        const base = {
          daily: ["直筒高腰裤 + 合身针织衫", "短外套 + A字半裙", "乐福鞋/低跟鞋提升通勤感"],
          date: ["收腰连衣裙 + 小开衫", "V领上衣 + 伞裙", "简约配饰突出颈肩线条"],
          sport: ["短款卫衣 + 高腰运动裤", "修身背心 + 轻量防晒外套", "运动鞋 + 干净配色"],
        };

        const shapeTips = {
          纤细型: "可适当叠穿，增加层次感和体积感。",
          匀称型: "可以尝试强调腰线，整体比例会更好。",
          微曲线型: "优先选挺括面料，修饰腹胯线条。",
          丰满型: "优先选择垂坠与结构感并存的版型，避免过紧。",
        };

        return [...base[occasion], shapeTips[bodyShape]];
      }

      document.getElementById("recommend-btn").addEventListener("click", () => {
        const knownSize = document.getElementById("knownSize").value;
        const height = Number(document.getElementById("height").value);
        const weight = Number(document.getElementById("weight").value);
        const occasion = document.getElementById("occasion").value;

        if (!height || !weight) return;

        const { size, bmi } = recommendSize(height, weight, knownSize);
        const shape = detectBodyShape(height, weight);
        const outfits = outfitBy(occasion, shape);

        document.getElementById("size-pill").textContent = `推荐尺码：${size}`;
        document.getElementById("shape-pill").textContent = `体型：${shape}`;
        document.getElementById("size-detail").textContent = `基于身高 ${height}cm、体重 ${weight}kg（BMI ${bmi}）估算。`;

        const list = document.getElementById("outfit-list");
        list.innerHTML = "";
        outfits.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          list.appendChild(li);
        });

        document.getElementById("result").style.display = "block";
      });
    </script>
  </body>
</html>
