# Derivation presets — single source of truth for per-chain defaults.
# Parsed by core/src/derivation/presets.rs at startup and embedded at
# compile time via `include_str!`. Runtime dispatch in
# core/src/derivation/runtime.rs reads from this file; there are no longer
# hardcoded match statements for chain curve / algorithm / address defaults.
#
# Fields:
#   name                  canonical display name (used by chain_defaults_from_name)
#   chain_id              numeric id matching the CHAIN_* constants in runtime.rs
#   aliases               optional extra display names that reuse this preset
#   curve                 secp256k1 | ed25519 | sr25519
#   derivation_algorithm  bip32_secp256k1 | slip10_ed25519 | direct_seed_ed25519
#                         | ton_mnemonic | bip32_ed25519_icarus | substrate_bip39
#                         | monero_bip39
#   address_algorithm     bitcoin | evm | solana | near_hex | ton_raw_account_id
#                         | cardano_shelley_enterprise | ss58 | monero_main
#                         | ton_v4r2 | litecoin | dogecoin | bitcoin_cash_legacy
#                         | bitcoin_sv_legacy | tron_base58_check
#                         | xrp_base58_check | stellar_strkey | sui_keccak
#                         | aptos_keccak | icp_principal
#   public_key_format     compressed | uncompressed | x_only | raw
#   script_type           (optional) p2pkh | p2sh_p2wpkh | p2wpkh | p2tr | account
#                         Bitcoin omits this; the script type is inferred from
#                         the derivation path's purpose level (44/49/84/86).
#   networks              list of mainnet | testnet | testnet4 | signet

# ── UTXO / secp256k1 ────────────────────────────────────────────────────

