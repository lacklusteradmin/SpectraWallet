name = "Bitcoin"
chain_id = 0
curve = "secp256k1"
derivation_algorithm = "bip32_secp256k1"
address_algorithm = "bitcoin"
public_key_format = "compressed"
networks = ["mainnet", "testnet", "testnet4", "signet"]

