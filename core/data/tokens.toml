# Spectra built-in token registry — single source of truth for both the
# Rust core (economic/technical fields) and the Swift UI (visual fields).
# Visual metadata (color_name, asset_name) is duplicated across chain rows
# for the same symbol — same values, short strings, acceptable redundancy.
# Fields: chain, chain_id, name, symbol, standard, contract, coingecko_id,
#         decimals, display_decimals?, category, color_name, asset_name, enabled
#
# Grouped by symbol; within each symbol, ordered by chain_id ascending. This
# layout makes it trivial to spot inconsistencies (decimals, asset_name,
# color_name, coingecko_id) across the same token on different chains.
#
# Reader/runtime mismatch: the runtime loader (`tokens::list_tokens(chain_id)`)
# iterates by chain, not by symbol — so the on-disk grouping is for human
# review while the access pattern is per-chain filtering. If you find
# yourself needing a "give me all USDC entries across chains" iteration in
# code, add a `tokens::list_by_symbol(symbol)` accessor; don't restructure
# the file.

